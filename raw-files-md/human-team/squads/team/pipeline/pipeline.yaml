pipeline:
  name: Time Criativo — Ideia → Conteúdo Publicável
  description: >
    Pipeline completa de produção criativa. Aceita uma ideia bruta como entrada
    e entrega uma peça publicável (KV, carrossel, post, e-mail, anúncio etc.) com
    distribuição e multiplicação em outros formatos. Cada agente pode ser
    invocado standalone também (ver agents/*.agent.md).

steps:
