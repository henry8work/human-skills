  - step-01-planner.md
  - step-02-scout.md
  - step-02b-checkpoint-pesquisa.md
  - step-03-creative-director.md
  - step-04-checkpoint-conceito.md
  - step-05-scriptwriter.md
  - step-06-checkpoint-roteiro.md
  - step-07-art-director.md
  - step-08-storyboarder.md
  - step-09-checkpoint-storyboard.md
  - step-10-producer.md
  - step-11-editor.md
  - step-12-checkpoint-final.md
  - step-13-social-manager.md
  - step-14-content-multiplier.md

checkpoints:
  - step-00-brief.md
  - step-02b-checkpoint-pesquisa.md
  - step-04-checkpoint-conceito.md
  - step-06-checkpoint-roteiro.md
  - step-09-checkpoint-storyboard.md
  - step-12-checkpoint-final.md
